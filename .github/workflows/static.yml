# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Single deploy job since we're just deploying
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Verify security policy
        run: bash scripts/verify-policy

      - name: Verify walkthrough artifact integrity (hashes vs sidecars)
        run: node scripts/verify-artifact-integrity.mjs examples

      - name: Scan publish scope for secret-like patterns
        run: node scripts/scan-publish-scope.mjs examples

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Validate publish artifact path against policy
        env:
          PUBLISH_ARTIFACT_PATH: "examples"
        run: |
          node --input-type=module -e "
          import { assertPublishArtifactPathAllowed } from './security/policy-runtime.mjs';
          assertPublishArtifactPathAllowed(process.env.PUBLISH_ARTIFACT_PATH || 'examples');
          console.error('publish path OK:', process.env.PUBLISH_ARTIFACT_PATH || 'examples');
          "

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "examples"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
